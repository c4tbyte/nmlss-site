<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NMLSS</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>

  <video class="bg" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/ycvrsako/video/upload/v1783804028/background-mp4.webm" type="video/webm">
    <source src="https://res.cloudinary.com/ycvrsako/video/upload/v1783709156/bg3.mp4" type="video/mp4">
  </video>

  <div class="splash" id="splash">
    <img src="assets/images/logo.gif" alt="NMLSS">
  </div>

  <div class="rec">
    <span class="rec-dot"></span>
    <span class="rec-text">REC</span>
  </div>

  <div class="camera-frame-left">
    <img src="assets/images/camera-frame-left.svg" alt="">
  </div>
  <div class="camera-frame-right">
    <img src="assets/images/camera-frame-right.svg" alt="">
  </div>

  <div class="timestamp">
    <span class="timestamp-time"></span>
    <span class="timestamp-date"></span>
  </div>

  <div class="battery">
    <img src="assets/images/battery.png" alt="">
  </div>

  <div class="social-links">
    <a href="https://instagram.com/nmlssofficial" target="_blank">
      <img src="assets/images/instagram.svg" alt="Instagram">
    </a>
    <a href="mailto:officiallynmlssentity@gmail.com">
      <img src="assets/images/mail.svg" alt="Email">
    </a>
  </div>

  <div class="content">
    <div class="header">
      <div class="logo">
        <img src="assets/images/logo.gif" alt="NMLSS">
      </div>
      <nav>
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Shop</a>
        <a href="archive.html">Archive</a>
      </nav>
    </div>
    <div class="gallery">
      <button class="arrow left">&#60;</button>
      <div class="gallery-viewport">
        <div class="gallery-track" id="galleryTrack"></div>
      </div>
      <button class="arrow right">&#62;</button>
    </div>
    <div class="about-section" id="aboutSection">
      <p>1/1 art for 1/1 people since 2022.</p>
      <p>Based in Tampa, FL. Shipping worldwide.</p>
      <p>DM on Instagram for commissions: @nmlssofficial</p>
    </div>
    <div class="about-section" id="shopSection">
      <p>COMING SOON...</p>
    </div>
  </div>

  <div class="modal" id="modal">
    <span class="modal-close" id="modalClose">&#10005;</span>
    <button class="modal-arrow left" id="modalPrev">&#60;</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <button class="modal-arrow right" id="modalNext">&#62;</button>
  </div>

  <script src="assets/js/main.js"></script>

</body>
</html>
